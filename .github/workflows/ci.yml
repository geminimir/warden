name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  oracle:
    name: Oracle + engine + generator fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: |
          pytest \
            tests/test_oracle.py \
            tests/test_rebac.py \
            tests/test_labels.py \
            tests/test_session.py \
            tests/test_audit.py \
            tests/test_gates.py \
            tests/test_api.py \
            tests/test_scenarios.py \
            tests/test_generators.py -v

  differential:
    name: Differential harness (5000 examples — W1 acceptance gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      # 5000 examples: the W1 acceptance criterion from warden-engineering-doc.md.
      # Any disagreement between core/oracle.py and core/rebac.py on any generated
      # graph will fail this job.
      - run: WARDEN_HYP_MAX=5000 pytest -m differential -v

  integration:
    name: Postgres + pgvector + Redis integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: warden
          POSTGRES_PASSWORD: warden
          POSTGRES_DB: warden
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U warden -d warden"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: |
          pytest \
            tests/test_postgres_store.py \
            tests/test_retrieval_pgvector.py \
            tests/test_labels_redis.py -v
        env:
          WARDEN_TEST_DB_URL: postgres://warden:warden@localhost:5432/warden
          WARDEN_TEST_REDIS_URL: redis://localhost:6379/0
