name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  oracle:
    name: Oracle + generator tests (must be green)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/test_oracle.py tests/test_generators.py -v

  differential:
    name: Differential harness (expected to fail until W1)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      # This job is informational until W1 lands. Once rebac.check() is wired
      # into evals/differential.py, remove `continue-on-error: true` above and
      # this becomes a required check.
      - run: pytest -m differential -v
