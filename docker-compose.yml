# Warden dev + integration-test stack.
#
#   docker compose up -d           # bring everything up
#   make postgres-integration      # W1 CRUD tests
#   make pgvector-integration      # W2 retrieval tests
#   docker compose down -v         # tear down + wipe volumes
#
# Postgres uses the pgvector image (W2 requires the vector extension).
# Redis backs the label cache with asymmetric invalidation semantics
# (grants: write-through; revocations: TTL). See core/labels.py.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: warden_postgres
    environment:
      POSTGRES_USER: warden
      POSTGRES_PASSWORD: warden
      POSTGRES_DB: warden
    ports:
      - "5432:5432"
    # Migrations are applied by the test fixture / API startup (see
    # core/postgres_store.py:apply_migrations), NOT by mounting sql/ into
    # docker-entrypoint-initdb.d. Reason: mounting from paths like iCloud
    # Drive or WSL bind-mounts is flaky, and applying schema in code keeps
    # dev, test, and prod on the same code path.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warden -d warden"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: warden_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
